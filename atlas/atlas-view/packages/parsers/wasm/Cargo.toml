[package]
name = "atlas-parsers"
version = "0.1.0"
edition = "2021"
description = "High-performance LAMMPS file parsers compiled to WebAssembly"
license = "Apache-2.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde-wasm-bindgen = "0.6"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["console"] }
flate2 = { version = "1", features = ["rust_backend"], default-features = false }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "s"       # Optimize for small WASM binary
lto = true
strip = "debuginfo"
