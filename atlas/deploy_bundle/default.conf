server {
    listen 8080;
    server_name localhost;

    include /etc/nginx/mime.types;
    types {
        application/wasm wasm;
    }

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Efficient static serving
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Serve pre-compressed files when available (.gz)
    gzip_static on;

    # Runtime gzip for anything not pre-compressed
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/wasm
        application/octet-stream
        image/svg+xml;

    # Health check for Cloud Run
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # LAMMPS trajectory / simulation data — highly compressible text
    location ~* \.(?:lammpstrj|xyz|dump)$ {
        gzip_static on;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";
    }

    # Video files — already compressed, skip gzip, support Range
    location ~* \.(?:mp4|webm|ogg|mov)$ {
        gzip off;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=604800";
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";
    }

    # Hashed static assets — long cache, immutable
    location ~* \.(?:js|css|wasm)$ {
        gzip_static on;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";
    }

    # Images and fonts
    location ~* \.(?:ico|gif|jpe?g|png|webp|avif|woff2?|eot|ttf|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";
    }

    # Default — SPA fallback for web app
    location / {
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";
        try_files $uri $uri/ /index.html;
    }
}
