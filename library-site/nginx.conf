server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/manifest+json
        image/svg+xml;

    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hashed/static assets — cache hard
    location ~* \.(js|css|woff2?|eot|ttf|svg|ico|png|jpg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Library JSON data — short cache so new builds pick up quickly
    location /data/ {
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    # Service worker and manifest — never cache at the edge, so updates propagate
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        types { } default_type "application/manifest+json";
    }

    # HTML — no aggressive caching
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
