name: atlas-view CI

# Pre-merge gate for the viewer. atlas-view has no other PR-triggered CI —
# until now the only check was the post-merge deploy-glim-viewer.yml build,
# which compiles but does not run the test suite. This mirrors that build
# (same pnpm/node/cache as deploy-glim-viewer) and adds the test suite, so a
# green PR predicts a green production deploy.

on:
  pull_request:
    paths:
      - 'atlas/atlas-view/**'
      - 'atlas/nist_ipr/**'
      - '.github/workflows/atlas-view-ci.yml'
  push:
    branches: [main]
    paths:
      - 'atlas/atlas-view/**'
      - '.github/workflows/atlas-view-ci.yml'

# A new push to a PR cancels the in-flight run for that ref.
concurrency:
  group: atlas-view-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Required gate: mirrors the deploy build + runs the full test suite ──
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas/atlas-view
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: atlas/atlas-view/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build (tsc --noEmit per package + vite web bundle)
        run: pnpm build

      - name: Test (turbo run test — all packages)
        run: pnpm test

  # ── Blocking gate: committed NIST catalog must match its source ──
  # Now reproducible from committed inputs (master_index.json +
  # scripts/nist-demo-manifest.json), so a stale catalog fails the build.
  nist-catalog-drift:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas/atlas-view
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: atlas/atlas-view/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
      - name: Rebuild catalog and fail on drift
        run: |
          npm run nist:build
          if ! git -C "$GITHUB_WORKSPACE" diff --quiet -- atlas/atlas-view/apps/web/public/nist; then
            echo "::error::Committed NIST catalog is stale. Run 'npm run nist:build' and commit the result."
            git -C "$GITHUB_WORKSPACE" diff -- atlas/atlas-view/apps/web/public/nist
            exit 1
          fi
          echo "NIST catalog is in sync with committed source."

  # ── Informational: GCS .glimbin streaming smoke test ──
  # Non-blocking: hits the public GCS bucket, so a transient network/CDN
  # blip shouldn't block merges — but it gives signal on the project's
  # historically most fragile path (WAF / edge black-holing / Range).
  streaming-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: atlas/atlas-view
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: atlas/atlas-view/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
      - name: Stream a small GCS .glimbin
        run: npm run verify:streaming

  # ── Informational: real-browser gallery/NIST UI smoke test ──
  # Non-blocking: GitHub-hosted runners have no GPU; the app mounts a WebGPU
  # canvas and headless WebGPU has historically been unreliable here. The
  # harness is mostly DOM/store assertions, but we don't gate merges on a
  # known-fragile path. Screenshots are uploaded for inspection.
  gallery-e2e:
    runs-on: ubuntu-latest
    needs: build-test
    continue-on-error: true
    defaults:
      run:
        working-directory: atlas/atlas-view
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: atlas/atlas-view/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Start dev server
        run: |
          nohup pnpm --filter @atlas/web exec vite --port 3000 --strictPort > /tmp/dev.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf -o /dev/null http://localhost:3000/ && echo "dev up after ${i}s" && break
            sleep 2
          done
      - name: Run gallery UI harness
        run: node tools/verify-gallery.mjs
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gallery-e2e-screenshots
          path: atlas/atlas-view/.verify-artifacts/
          if-no-files-found: ignore
      - name: Dump dev server log on failure
        if: failure()
        run: tail -50 /tmp/dev.log || true
