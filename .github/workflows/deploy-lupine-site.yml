name: Deploy Lupine Site to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'lupine-site/**'
      - '.github/workflows/deploy-lupine-site.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # Required for Workload Identity Federation

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lupine-site/package-lock.json

      - name: Install dependencies and Build
        working-directory: lupine-site
        run: |
          npm ci
          npm run build

      - name: Install Playwright Browsers
        working-directory: lupine-site
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: lupine-site
        run: npm run test:e2e

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          # We recommend using Workload Identity Federation for security
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Validate Secrets Pre-flight
        run: |
          if [ -z "${{ secrets.GCP_SERVICE_NAME_SITE }}" ]; then
            echo "::error::MISSING SECRET: GCP_SERVICE_NAME_SITE is not defined in GitHub Repo Secrets. It should be (lupine-site)."
            exit 1
          fi
          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "::error::MISSING SECRET: GCP_PROJECT_ID is not defined in GitHub Repo Secrets."
            exit 1
          fi
          if [ -z "${{ secrets.GCP_REGION }}" ]; then
            echo "::error::MISSING SECRET: GCP_REGION is not defined in GitHub Repo Secrets."
            exit 1
          fi

      - name: Deploy to Cloud Run
        id: deploy
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          source: 'lupine-site'
          service: '${{ secrets.GCP_SERVICE_NAME_SITE }}'
          region: '${{ secrets.GCP_REGION }}'
          project_id: '${{ secrets.GCP_PROJECT_ID }}'
          flags: '--allow-unauthenticated'

      - name: Show output
        run: echo ${{ steps.deploy.outputs.url }}
