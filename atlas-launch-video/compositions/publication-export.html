<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../styles/global.css" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    .overlay-text {
      position: absolute; bottom: 80px; right: 80px;
      display: flex; flex-direction: column; gap: 12px; align-items: flex-end; opacity: 0;
    }
    .overlay-text .big { font-size: 40px; font-weight: 800; letter-spacing: -0.02em; }
    .overlay-text .sub { font-size: 18px; font-weight: 500; color: var(--text-muted); }
    .overlay-text .sub em { font-style: normal; color: var(--accent); }
    .export-pills { position: absolute; top: 80px; right: 100px; display: flex; gap: 12px; opacity: 0; }
    .export-pills .ep { padding: 8px 18px; font-size: 14px; font-weight: 600; color: var(--text-secondary); background: var(--bg-glass); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; }
  </style>
</head>
<body>
  <div id="root" data-composition-id="publication-export" data-start="0" data-duration="8" data-width="1920" data-height="1080">
    <video id="export-video" data-start="0" data-duration="8" data-track-index="0"
           src="../assets/export-recording.mp4" muted playsinline
           style="position:absolute;inset:0;width:1920px;height:1080px;object-fit:cover;">
    </video>

    <div class="export-pills clip" id="pills" data-start="0.5" data-duration="7.5" data-track-index="1">
      <div class="ep">PNG up to 8K</div>
      <div class="ep">WebCodecs MP4</div>
      <div class="ep">Shareable URLs</div>
    </div>

    <div class="overlay-text clip" id="overlay" data-start="1" data-duration="7" data-track-index="2">
      <div class="big">Publication Export</div>
      <div class="sub">Render. Share. <em>Publish.</em></div>
    </div>
  </div>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });
    tl.to("#pills", { opacity: 1, duration: 0.4 }, 0.5);
    tl.to("#overlay", { opacity: 1, duration: 0.4 }, 1);
    tl.from("#overlay", { y: 20, duration: 0.4, ease: "power2.out" }, 1);
    tl.to("#overlay, #pills", { opacity: 0, duration: 0.3 }, 7.5);
    tl.set({}, {}, 8);
    window.__timelines["publication-export"] = tl;
  </script>
</body>
</html>
