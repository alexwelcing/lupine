<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../styles/global.css" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    .brand-container {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    .logo-main { display: flex; align-items: baseline; gap: 4px; opacity: 0; }
    .logo-glim { font-size: 96px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.03em; }
    .logo-pse { font-size: 96px; font-weight: 500; color: var(--accent); }
    .logo-sub { font-size: 22px; font-weight: 400; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; opacity: 0; margin-top: 8px; }
    .tagline { font-size: 28px; font-weight: 300; color: var(--text-secondary); margin-top: 24px; opacity: 0; }
    .tagline em { font-style: normal; color: var(--accent); font-weight: 500; }
    .center-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, var(--accent-glow), transparent 70%); opacity: 0; filter: blur(40px); }
    .accent-line { width: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0; margin-top: 20px; }
  </style>
</head>
<body>
  <div id="root" data-composition-id="brand-reveal" data-start="0" data-duration="4" data-width="1920" data-height="1080">
    <div class="grid-bg clip" id="grid" data-start="0" data-duration="4" data-track-index="0"></div>
    <div class="center-glow clip" id="glow" data-start="0" data-duration="3" data-track-index="1"></div>
    <div class="brand-container clip" id="brand" data-start="0" data-duration="4" data-track-index="2">
      <div class="logo-main" id="logo"><span class="logo-glim">glim</span><span class="logo-pse">PSE</span></div>
      <div class="logo-sub" id="subtitle">by Lupine Materials Science</div>
      <div class="accent-line" id="accent-line"></div>
      <div class="tagline" id="tagline">Drag a file. See your atoms. <em>Publication quality in 2 seconds.</em></div>
    </div>
    <div class="scanlines clip" id="scan" data-start="0" data-duration="4" data-track-index="3"></div>
  </div>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });
    tl.to("#glow", { opacity: 1, scale: 2, duration: 0.6, ease: "power2.out" }, 0);
    tl.to("#glow", { opacity: 0, scale: 3, duration: 1, ease: "power1.in" }, 0.8);
    tl.to("#logo", { opacity: 1, duration: 0.01 }, 0.5);
    tl.from("#logo", { scale: 0.6, duration: 0.8, ease: "elastic.out(1, 0.5)" }, 0.5);
    tl.from("#subtitle", { opacity: 0, y: 10, duration: 0.4, ease: "power2.out" }, 1.3);
    tl.to("#accent-line", { opacity: 0.6, width: 200, duration: 0.5 }, 1.6);
    tl.to("#tagline", { opacity: 1, duration: 0.5 }, 2.0);
    tl.from("#tagline", { y: 12, duration: 0.5 }, 2.0);
    tl.to("#brand", { opacity: 0, duration: 0.3 }, 3.6);
    tl.set({}, {}, 4);
    window.__timelines["brand-reveal"] = tl;
  </script>
</body>
</html>
