server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # Health check
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets
    location ~* \.(js|css|woff2?|eot|ttf|svg|ico|png|jpg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # HTML pages — no aggressive caching for content updates
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # SPA-style fallback (landing page)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
