<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GLIMPSE HUD</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@400;700&amp;family=Newsreader:ital,wght@0,400;0,700;1,400;1,700&amp;family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#34343c",
                        "on-tertiary-fixed-variant": "#5b4300",
                        "on-error-container": "#ffdad6",
                        "on-secondary": "#003734",
                        "surface-container": "#1e1f27",
                        "on-surface-variant": "#c6c5d5",
                        "tertiary-container": "#8e6a00",
                        "surface-container-low": "#1a1b23",
                        "outline-variant": "#454653",
                        "on-secondary-container": "#00302d",
                        "tertiary-fixed-dim": "#eec058",
                        "on-tertiary": "#402d00",
                        "surface": "#12131a",
                        "secondary": "#5dd9d0",
                        "on-tertiary-container": "#fff3e1",
                        "secondary-fixed-dim": "#5dd9d0",
                        "on-primary-container": "#f5f3ff",
                        "primary-container": "#5565d4",
                        "inverse-on-surface": "#2f3038",
                        "on-error": "#690005",
                        "tertiary": "#eec058",
                        "error": "#ffb4ab",
                        "inverse-primary": "#4353c2",
                        "on-secondary-fixed-variant": "#00504c",
                        "inverse-surface": "#e3e1ec",
                        "tertiary-fixed": "#ffdf9f",
                        "primary": "#bcc3ff",
                        "primary-fixed-dim": "#bcc3ff",
                        "background": "#12131a",
                        "surface-tint": "#bcc3ff",
                        "surface-container-high": "#292931",
                        "surface-bright": "#383941",
                        "on-primary-fixed-variant": "#2839a9",
                        "surface-container-lowest": "#0d0e15",
                        "on-primary-fixed": "#000d60",
                        "on-surface": "#e3e1ec",
                        "secondary-container": "#00a29a",
                        "outline": "#8f8f9f",
                        "on-secondary-fixed": "#00201e",
                        "surface-container-highest": "#34343c",
                        "secondary-fixed": "#7cf6ec",
                        "on-background": "#e3e1ec",
                        "on-tertiary-fixed": "#261a00",
                        "error-container": "#93000a",
                        "surface-dim": "#12131a",
                        "primary-fixed": "#dfe0ff",
                        "on-primary": "#051c93"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Playfair Display"],
                        "body": ["Inter"],
                        "label": ["JetBrains Mono"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: transparent; /* Transparent for WebGL background */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface font-body h-screen w-screen overflow-hidden flex flex-col relative">
<!-- TopAppBar JSON Component -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-transparent backdrop-blur-xl shadow-[0_0_40px_rgba(227,225,236,0.1)] transition-all">
<button class="text-indigo-200 hover:bg-white/10 transition-colors scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="insights">insights</span>
</button>
<h1 class="text-lg font-bold tracking-tighter text-indigo-100 font-['Playfair_Display'] italic tracking-wide">GLIMPSE HUD</h1>
<button class="text-indigo-200 hover:bg-white/10 transition-colors scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="settings_cinematic">settings_cinematic_blur</span>
</button>
</header>
<!-- Transparent Viewport Area (Top 70%) -->
<main class="flex-grow flex flex-col relative">
<div aria-label="Transparent WebGL Viewport" class="h-[70%] w-full flex items-center justify-center">
<!-- WebGL Content would be rendered behind this entire layout -->
</div>
<!-- Bottom Sheet Controls (Bottom 30%) -->
<section class="h-[30%] w-full bg-surface-container-highest/60 backdrop-blur-[30px] rounded-t-[2rem] p-6 flex flex-col gap-6 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t border-outline-variant/15 relative z-40 mt-auto">
<!-- Handle -->
<div class="w-12 h-1 bg-outline-variant/50 rounded-full mx-auto -mt-2 mb-2"></div>
<!-- Header -->
<div class="flex justify-between items-center w-full">
<h2 class="font-headline text-2xl text-primary tracking-wide">VIEWER CONTROLS</h2>
<span class="font-label text-xs text-secondary tracking-widest uppercase">V.2.04</span>
</div>
<!-- Controls Grid -->
<div class="grid grid-cols-2 gap-4 flex-grow">
<!-- Visual Effects Toggles -->
<div class="flex flex-col gap-4 justify-center bg-surface-container-low p-4 rounded-xl">
<!-- Toggle 1 -->
<div class="flex items-center justify-between">
<span class="font-label text-sm text-on-surface-variant">BLOOM</span>
<div class="w-12 h-6 bg-primary-container rounded-full p-1 cursor-pointer flex items-center relative">
<div class="w-4 h-4 bg-on-primary-container rounded-full absolute right-1 shadow-md"></div>
</div>
</div>
<!-- Toggle 2 -->
<div class="flex items-center justify-between">
<span class="font-label text-sm text-on-surface-variant">SSAO</span>
<div class="w-12 h-6 bg-surface-container-highest rounded-full p-1 cursor-pointer flex items-center border border-outline-variant/20 relative">
<div class="w-4 h-4 bg-outline-variant rounded-full absolute left-1"></div>
</div>
</div>
</div>
<!-- Simulation Speed Slider -->
<div class="flex flex-col gap-3 justify-center bg-surface-container-low p-4 rounded-xl">
<div class="flex justify-between items-end mb-1">
<span class="font-label text-xs text-on-surface-variant">SIMULATION SPEED</span>
<span class="font-label text-sm text-tertiary">1.5x</span>
</div>
<!-- Custom Slider Design -->
<div class="relative w-full h-2 bg-surface-container-highest rounded-full mt-2 border border-outline-variant/10">
<div class="absolute top-0 left-0 h-full w-[60%] bg-gradient-to-r from-primary to-primary-container rounded-full"></div>
<!-- Thumb -->
<div class="absolute top-1/2 left-[60%] w-4 h-4 bg-on-primary-container rounded-full -translate-y-1/2 -translate-x-1/2 shadow-[0_0_15px_rgba(188,195,255,0.5)] cursor-pointer"></div>
<!-- Discrete Markers -->
<div class="absolute w-full flex justify-between top-4 px-1">
<div class="w-[1px] h-1 bg-outline-variant/50"></div>
<div class="w-[1px] h-1 bg-outline-variant/50"></div>
<div class="w-[1px] h-1 bg-outline-variant/50"></div>
<div class="w-[1px] h-1 bg-outline-variant/50"></div>
<div class="w-[1px] h-1 bg-outline-variant/50"></div>
</div>
</div>
</div>
</div>
<!-- Action Area -->
<div class="w-full flex justify-end mt-auto pt-2">
<button class="bg-surface-container-high border border-outline-variant/15 text-primary font-label text-xs tracking-widest px-6 py-3 rounded-lg hover:bg-surface-container-highest transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]" data-icon="refresh">refresh</span>
                    RESET VIEW
                </button>
</div>
</section>
</main>
<!-- BottomNavBar JSON Component (Hidden on larger screens as per spec, but rendered for mobile) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-slate-950/60 backdrop-blur-2xl rounded-t-3xl border-t border-white/10 shadow-2xl md:hidden">
<button class="flex items-center justify-center bg-indigo-500/20 text-indigo-200 rounded-xl p-3 hover:text-white transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="query_stats" data-weight="fill" style="font-variation-settings: 'FILL' 1;">query_stats</span>
</button>
<button class="flex items-center justify-center text-slate-400 p-3 hover:text-white transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
</button>
<button class="flex items-center justify-center text-slate-400 p-3 hover:text-white transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="biotech">biotech</span>
</button>
<button class="flex items-center justify-center text-slate-400 p-3 hover:text-white transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
</button>
</nav>
</body></html>
