<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Volcanic Core Mobile UI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Manrope:wght@200..800&amp;family=Space+Grotesk:wght@300..700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "outline-variant": "#494847",
                        "on-background": "#ffffff",
                        "outline": "#777575",
                        "on-tertiary-fixed": "#2d003e",
                        "primary-fixed-dim": "#ff5d2e",
                        "surface-container-low": "#131313",
                        "surface-container-high": "#201f1f",
                        "inverse-on-surface": "#565554",
                        "tertiary-container": "#e094f8",
                        "on-primary-fixed-variant": "#581200",
                        "on-error": "#490006",
                        "inverse-primary": "#b22e00",
                        "on-surface-variant": "#adaaaa",
                        "tertiary-fixed": "#e094f8",
                        "surface": "#0e0e0e",
                        "on-secondary-container": "#ffc2b8",
                        "error-dim": "#d7383b",
                        "on-secondary": "#4a0000",
                        "on-tertiary-container": "#52076c",
                        "on-primary-fixed": "#000000",
                        "on-surface": "#ffffff",
                        "inverse-surface": "#fcf8f8",
                        "secondary-dim": "#ff725e",
                        "on-tertiary": "#5d1877",
                        "primary-dim": "#ff734c",
                        "tertiary": "#eaa5ff",
                        "primary-container": "#ff7852",
                        "surface-dim": "#0e0e0e",
                        "surface-bright": "#2c2c2c",
                        "surface-container-lowest": "#000000",
                        "surface-variant": "#262626",
                        "surface-tint": "#ff8f70",
                        "tertiary-fixed-dim": "#d187e9",
                        "background": "#0e0e0e",
                        "on-primary-container": "#480d00",
                        "error-container": "#9f0519",
                        "secondary": "#ff725e",
                        "secondary-fixed": "#ffc4ba",
                        "tertiary-dim": "#d187e9",
                        "secondary-container": "#920703",
                        "surface-container-highest": "#262626",
                        "primary-fixed": "#ff7852",
                        "on-primary": "#5c1300",
                        "error": "#ff716c",
                        "primary": "#ff8f70",
                        "on-error-container": "#ffa8a3",
                        "secondary-fixed-dim": "#ffb0a3",
                        "on-secondary-fixed-variant": "#a0160c",
                        "on-secondary-fixed": "#700000",
                        "surface-container": "#1a1919",
                        "on-tertiary-fixed-variant": "#5c1675"
                    },
                    borderRadius: {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "0px"
                    },
                    fontFamily: {
                        "headline": ["Newsreader", "serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Space Grotesk", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .drop-shadow-glow {
            filter: drop-shadow(0 0 10px rgba(255, 143, 112, 0.6));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface font-body h-screen flex flex-col overflow-hidden">
<!-- Magma Background Layer -->
<div class="fixed inset-0 z-0 bg-gradient-to-b from-surface-container-lowest via-[#2a0500] to-secondary-container opacity-80" data-alt="Hyper-realistic slow-moving pool of luminescent deep-red and orange magma fluid, catching fiery under-glow, obsidian shadows"></div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-black/60 backdrop-blur-2xl shadow-[0_4px_20px_rgba(74,0,0,0.15)] border-b border-[#494847]/15 rounded-none flex items-center justify-between px-6 py-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-orange-600 dark:text-[#ff7852] text-2xl" data-icon="local_fire_department" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="font-['Newsreader'] tracking-tighter italic font-black uppercase text-3xl text-[#ff7852] drop-shadow-[0_0_15px_rgba(255,120,82,0.4)]">VOLCANIC CORE</span>
</div>
<button class="text-[#494847] hover:text-[#ff8f70] transition-colors duration-300 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 relative z-10 overflow-y-auto mt-[72px] mb-[72px] p-6 flex flex-col gap-8 pb-32">
<!-- Core Temperature Readout -->
<section class="flex flex-col items-center justify-center py-12 relative">
<div class="absolute inset-0 bg-primary-dim opacity-10 blur-3xl pointer-events-none"></div>
<h2 class="font-label text-surface-tint tracking-widest uppercase text-xs mb-2 z-10">Core Temperature</h2>
<div class="font-headline text-[5rem] font-black tracking-tighter text-on-surface leading-none z-10 drop-shadow-glow flex items-baseline">
                42,000<span class="text-3xl text-surface-tint ml-2">K</span>
</div>
<p class="font-body text-surface-tint/70 text-sm mt-4 z-10">STABLE · CRITICAL THRESHOLD: 50,000K</p>
</section>
<!-- Telemetry Panels Bento Grid -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Pressure Block -->
<div class="bg-surface-variant/60 backdrop-blur-[24px] border-b border-outline-variant/15 p-6 shadow-[0_40px_40px_-15px_rgba(74,0,0,0.15)] relative overflow-hidden group">
<div class="absolute bottom-0 left-0 right-0 h-1 bg-gradient-to-t from-primary to-secondary-container opacity-50"></div>
<div class="flex justify-between items-start mb-6">
<span class="font-label text-on-surface-variant tracking-widest text-[10px] uppercase">Internal Pressure</span>
<span class="material-symbols-outlined text-surface-tint text-xl" data-icon="compress">compress</span>
</div>
<div class="font-headline text-5xl font-black tracking-tighter text-on-surface">
                    8.4<span class="text-xl text-surface-tint ml-1">GPa</span>
</div>
</div>
<!-- Neutron Flux Block -->
<div class="bg-surface-variant/60 backdrop-blur-[24px] border-b border-outline-variant/15 p-6 shadow-[0_40px_40px_-15px_rgba(74,0,0,0.15)] relative overflow-hidden group">
<div class="absolute bottom-0 left-0 right-0 h-1 bg-gradient-to-t from-primary to-secondary-container opacity-50"></div>
<div class="flex justify-between items-start mb-6">
<span class="font-label text-on-surface-variant tracking-widest text-[10px] uppercase">Neutron Flux</span>
<span class="material-symbols-outlined text-surface-tint text-xl" data-icon="blur_on">blur_on</span>
</div>
<div class="font-headline text-5xl font-black tracking-tighter text-on-surface">
                    1.2<span class="text-xl text-surface-tint ml-1">e14</span>
</div>
</div>
<!-- Casing Integrity Block (Full Width) -->
<div class="col-span-1 md:col-span-2 bg-surface-variant/60 backdrop-blur-[24px] border-b border-outline-variant/15 p-6 shadow-[0_40px_40px_-15px_rgba(74,0,0,0.15)] relative overflow-hidden">
<div class="absolute bottom-0 left-0 right-0 h-2 bg-gradient-to-t from-primary to-secondary-container opacity-70"></div>
<div class="flex justify-between items-start mb-6">
<span class="font-label text-on-surface-variant tracking-widest text-[10px] uppercase">Casing Integrity</span>
<span class="material-symbols-outlined text-surface-tint text-xl" data-icon="shield">shield</span>
</div>
<div class="flex items-baseline gap-4 mb-4">
<div class="font-headline text-6xl font-black tracking-tighter text-on-surface">
                        99.9<span class="text-2xl text-surface-tint ml-1">%</span>
</div>
</div>
<div class="h-1 w-full bg-surface-container-lowest overflow-hidden">
<div class="h-full bg-primary-fixed w-[99.9%]"></div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#000000]/80 backdrop-blur-3xl shadow-[0_-10px_40px_rgba(74,0,0,0.3)] border-t border-[#494847]/20 flex justify-around items-center h-[72px]">
<div class="absolute top-0 left-0 right-0 h-16 bg-gradient-to-t from-[#920703]/20 to-transparent pointer-events-none"></div>
<button class="flex flex-col items-center justify-center text-[#ff4847] p-4 hover:bg-[#1a1919] hover:text-[#ff7852] active:brightness-125 transition-all duration-200 w-full h-full">
<span class="material-symbols-outlined text-2xl" data-icon="bolt">bolt</span>
</button>
<!-- Active Tab: Thermostat (matching Core Temperature intent) -->
<button class="flex flex-col items-center justify-center text-[#ff8f70] bg-[#2c2c2c] shadow-[inset_0_-2px_0_#ff8f70] p-4 w-full h-full active:brightness-125 transition-all duration-200">
<span class="material-symbols-outlined text-2xl" data-icon="thermostat" style="font-variation-settings: 'FILL' 1;">thermostat</span>
</button>
<button class="flex flex-col items-center justify-center text-[#494847] p-4 hover:bg-[#1a1919] hover:text-[#ff7852] active:brightness-125 transition-all duration-200 w-full h-full">
<span class="material-symbols-outlined text-2xl" data-icon="monitor_heart">monitor_heart</span>
</button>
<button class="flex flex-col items-center justify-center text-[#494847] p-4 hover:bg-[#1a1919] hover:text-[#ff7852] active:brightness-125 transition-all duration-200 w-full h-full">
<span class="material-symbols-outlined text-2xl" data-icon="terminal">terminal</span>
</button>
</nav>
</body></html>
